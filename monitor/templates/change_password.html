<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>修改密码 — Corp Assistant Monitor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
  body { background: #f0f2f5; }
  .card { max-width: 420px; margin: 100px auto; }
</style>
</head>
<body>
<div class="card shadow-sm p-4">
  <h5 class="mb-1 fw-bold">修改密码</h5>
  <p class="text-muted small mb-4">首次登录请修改默认密码（{{ username }}）</p>
  {% if error %}
  <div class="alert alert-danger py-2">{{ error }}</div>
  {% endif %}
  <form method="post" action="/change-password">
    <div class="mb-3">
      <label class="form-label">新密码 <span class="text-muted">(至少 8 位)</span></label>
      <input type="password" name="new_password" class="form-control" required autofocus minlength="8">
    </div>
    <div class="mb-3">
      <label class="form-label">确认新密码</label>
      <input type="password" name="confirm_password" class="form-control" required minlength="8">
    </div>
    <button type="submit" class="btn btn-primary w-100">确认修改</button>
  </form>
</div>
</body>
</html>
